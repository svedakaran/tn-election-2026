<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>2026 Vote Support</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial, sans-serif;
margin:0;
background-image:url("https://images.unsplash.com/photo-1559056199-641a0ac8b55e?auto=format&fit=crop&w=1600&q=60"); /* election style background with voting theme */
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.overlay{
background:rgba(255,255,255,0.93);
min-height:100vh;
padding:25px;
text-align:center;
}

h1{font-size:34px;margin-bottom:5px}

.party-img{
height:120px;
margin:12px;
object-fit:contain;
}

.evm{
margin:auto;
width:320px;
background:#f5f5f5;
border:3px solid #999;
border-radius:10px;
padding:15px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.evm button{
width:90%;
padding:12px;
margin:8px;
font-size:18px;
border:none;
border-radius:6px;
cursor:pointer;
position:relative;
}

.dmk{background:#ffcc33}
.aiadmk{background:#66cc66}
.tvk{background:#ff6666}

/* EVM indicator light */
.evm button::after{
content:"";
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
width:12px;
height:12px;
border-radius:50%;
background:red;
animation:blink 1.2s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0.2}
100%{opacity:1}
}

select{
padding:10px;
font-size:16px;
margin-bottom:15px;
width:320px;
}

#msg{font-weight:bold;margin-top:10px;color:green}

.results{margin-top:30px}

.seatbox{font-size:20px;margin-bottom:10px}

.tablewrap{
max-height:320px;
overflow:auto;
border:1px solid #ddd;
margin-top:10px;
}

table{width:100%;border-collapse:collapse;background:white}

th,td{border:1px solid #ddd;padding:6px}

th{background:#f2f2f2}
</style>
</head>

<body>

<div class="overlay">

<h1>2026 Tamil Nadu Election Vote Support</h1>
<p style="font-size:18px;font-weight:bold;color:#333">Majority mark: 118 seats to form government</p>
<p>Select constituency and vote</p>

<div>
<img class="party-img" src="https://upload.wikimedia.org/wikipedia/commons/5/5f/DMK_Flag.png">
<img class="party-img" src="https://upload.wikimedia.org/wikipedia/commons/7/7b/AIADMK_Flag.png">
<img class="party-img" src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Vijay_actor.jpg">
</div>

<h3>Select Tamil Nadu Constituency</h3>
<select id="constituency"></select>

<div class="evm">
<button class="dmk" onclick="vote('DMK')">Vote DMK</button>
<button class="aiadmk" onclick="vote('AIADMK')">Vote AIADMK</button>
<button class="tvk" onclick="vote('TVK')">Vote TVK</button>
</div>

<p id="msg"></p>

<div class="results">

<div class="seatbox">
Seat Projection (Total 234 Seats):
DMK <span id="dmkSeats">0</span> |
AIADMK <span id="aiadmkSeats">0</span> |
TVK <span id="tvkSeats">0</span>
</div>

<canvas id="chart" width="420" height="200"></canvas>

<div class="tablewrap">
<table id="resultsTable">
<tr><th>Constituency</th><th>DMK</th><th>AIADMK</th><th>TVK</th></tr>
</table>
</div>

</div>

</div>

<script>

const constituencies=[
"Gummidipoondi","Ponneri","Tiruttani","Thiruvallur","Poonamallee","Avadi","Maduravoyal","Ambattur","Madhavaram","Tiruvottiyur",
"Dr. Radhakrishnan Nagar","Perambur","Kolathur","Villivakkam","Thiru. Vi. Ka. Nagar","Egmore","Royapuram","Harbour","Chepauk–Triplicane","Thousand Lights",
"Anna Nagar","Virugambakkam","Saidapet","T. Nagar","Mylapore","Velachery","Sholinganallur","Alandur","Sriperumbudur","Pallavaram",
"Tambaram","Chengalpattu","Thiruporur","Cheyyur","Madurantakam","Uthiramerur","Kancheepuram","Arakkonam","Sholingur","Katpadi",
"Ranipet","Arcot","Vellore","Anaikattu","Kilvaithinankuppam","Gudiyattam","Vaniyambadi","Ambur","Jolarpet","Tirupattur",
"Uthangarai","Bargur","Krishnagiri","Veppanahalli","Hosur","Thalli","Palacode","Pennagaram","Dharmapuri","Pappireddippatti",
"Harur","Chengam","Tiruvannamalai","Kilpennathur","Kalasapakkam","Polur","Arani","Cheyyar","Vandavasi","Gingee",
"Mailam","Tindivanam","Vanur","Villupuram","Vikravandi","Tirukkoyilur","Ulundurpettai","Rishivandiyam","Sankarapuram","Kallakurichi",
"Gangavalli","Attur","Yercaud","Omalur","Mettur","Edappadi","Sankari","Salem West","Salem North","Salem South",
"Veerapandi","Rasipuram","Senthamangalam","Namakkal","Paramathi Velur","Tiruchengodu","Kumarapalayam","Erode East","Erode West","Modakkurichi",
"Dharapuram","Kangayam","Perundurai","Bhavani","Anthiyur","Gobichettipalayam","Bhavanisagar","Udhagamandalam","Gudalur","Coonoor",
"Mettupalayam","Avanashi","Tiruppur North","Tiruppur South","Palladam","Sulur","Kavundampalayam","Coimbatore North","Coimbatore South","Singanallur",
"Thondamuthur","Kinathukadavu","Pollachi","Valparai","Udumalpet","Madathukulam","Palani","Oddanchatram","Athoor","Nilakkottai",
"Natham","Dindigul","Vedasandur","Aravakurichi","Karur","Krishnarayapuram","Kulithalai","Manapparai","Srirangam","Tiruchirappalli West",
"Tiruchirappalli East","Thiruverumbur","Lalgudi","Manachanallur","Musiri","Thuraiyur","Perambalur","Kunnam","Ariyalur","Jayankondam",
"Tittakudi","Vriddhachalam","Neyveli","Panruti","Cuddalore","Kurinjipadi","Bhuvanagiri","Chidambaram","Kattumannarkoil","Sirkazhi",
"Mayiladuthurai","Poompuhar","Thiruvidaimarudur","Kumbakonam","Papanasam","Thiruvaiyaru","Thanjavur","Orathanadu","Pattukkottai","Peravurani",
"Gandharvakottai","Viralimalai","Pudukkottai","Thirumayam","Alangudi","Aranthangi","Karaikudi","Tiruppattur","Sivaganga","Manamadurai",
"Melur","Madurai East","Madurai North","Madurai South","Madurai Central","Madurai West","Thiruparankundram","Thirumangalam","Usilampatti","Andipatti",
"Periyakulam","Bodinayakanur","Cumbum","Rajapalayam","Srivilliputhur","Sattur","Sivakasi","Virudhunagar","Aruppukkottai","Tiruchuli",
"Paramakudi","Tiruvadanai","Ramanathapuram","Mudhukulathur","Vilathikulam","Thoothukudi","Tiruchendur","Srivaikuntam","Ottapidaram","Kovilpatti",
"Sankarankovil","Vasudevanallur","Kadayanallur","Tenkasi","Alangulam","Tirunelveli","Ambasamudram","Palayamkottai","Nanguneri","Radhapuram",
"Kanniyakumari","Nagercoil","Colachel","Padmanabhapuram","Vilavancode","Killiyoor"
];

const parties=["DMK","AIADMK","TVK"];

const constituencySelect=document.getElementById("constituency");

constituencies.forEach((c,i)=>{
 const opt=document.createElement("option");
 opt.value=i;
 opt.text=c;
 constituencySelect.appendChild(opt);
});

let data=JSON.parse(localStorage.getItem("votes2026"));

if(!data){
 data={};
 constituencies.forEach((c,i)=>{
  data[i]={DMK:0,AIADMK:0,TVK:0};
 });
}

function vote(party){

 if(localStorage.getItem("voted2026")){
  document.getElementById("msg").innerText="You already voted from this device.";
  return;
 }

 const seat=document.getElementById("constituency").value;

 data[seat][party]++;

 localStorage.setItem("votes2026",JSON.stringify(data));
 localStorage.setItem("voted2026","yes");

 document.getElementById("msg").innerText="Vote recorded successfully.";

 updateTable();
 updateChart();
 calculateSeats();
}

function updateTable(){
 const table=document.getElementById("resultsTable");
 table.innerHTML="<tr><th>Constituency</th><th>DMK</th><th>AIADMK</th><th>TVK</th></tr>";

 constituencies.forEach((c,i)=>{
  table.innerHTML+=`<tr>
  <td>${c}</td>
  <td>${data[i].DMK}</td>
  <td>${data[i].AIADMK}</td>
  <td>${data[i].TVK}</td>
  </tr>`;
 });
}

function totalParty(p){
 let t=0;
 constituencies.forEach((c,i)=>t+=data[i][p]);
 return t;
}

function calculateSeats(){
 const majority=118;
 let dmk=0,aiadmk=0,tvk=0;

 constituencies.forEach((c,i)=>{
  const seat=data[i];
  const max=Math.max(seat.DMK,seat.AIADMK,seat.TVK);

  if(max===seat.DMK && max>0) dmk++;
  else if(max===seat.AIADMK && max>0) aiadmk++;
  else if(max===seat.TVK && max>0) tvk++;
 });

 document.getElementById("dmkSeats").innerText=dmk;
 document.getElementById("aiadmkSeats").innerText=aiadmk;
 document.getElementById("tvkSeats").innerText=tvk;
}

let chart;

function updateChart(){
 const values=[totalParty("DMK"),totalParty("AIADMK"),totalParty("TVK")];

 if(chart) chart.destroy();

 chart=new Chart(document.getElementById("chart"),{
 type:"bar",
 data:{
  labels:parties,
  datasets:[{label:"Votes",data:values}]
 }
 });
}

updateTable();
updateChart();
calculateSeats();

</script>

</body>
</html>
